<!-- Fontawesome -->
<link rel="stylesheet" href="//unpkg.com/@fortawesome/fontawesome-free/css/fontawesome.css" />
<link rel="stylesheet" href="//unpkg.com/@fortawesome/fontawesome-free/css/brands.css" />
<link rel="stylesheet" href="//unpkg.com/@fortawesome/fontawesome-free/css/regular.css" />
<link rel="stylesheet" href="//unpkg.com/@fortawesome/fontawesome-free/css/solid.css" />

  rel="stylesheet"
  href="./_assets/css/style.css"
  type="text/css"
/>
<head>
  <meta charset="utf-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1, minimum-scale=1.0, shrink-to-fit=no, viewport-fit=cover">

  <!-- Replace with your own title and description. -->
  <title>Mythras Imperative System Resource Document</title>
  <meta name="description" content="Mythras Imperative System Resource Document">

  <!-- Default Theme (see https://docsify.js.org/#/themes) -->
  <!-- <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"> -->
   
   <link rel="icon" href="_media/favicon.ico">


</head>

<body>
  <div id="app"></div>

  <script>
    var languageOptions = [
      { code: 'en', label: 'English (en)' },
      { code: 'es', label: 'Español (es)' },
      { code: 'fr', label: 'Français (fr)' },
      { code: 'it', label: 'Italiano (it)' },
      { code: 'el', label: 'Ελληνικά (el)' },
      { code: 'zh-CN', label: 'Mandarin Chinese (zh-CN)' },
      { code: 'ar', label: 'Arabic (ar)' },
      { code: 'hi', label: 'Hindi (hi)' },
      { code: 'ja', label: 'Japanese (ja)' },
      { code: 'ko', label: 'Korean (ko)' },
      { code: 'tr', label: 'Turkish (tr)' },
      { code: 'vi', label: 'Vietnamese (vi)' },
      { code: 'ru', label: 'Russian (ru)' },
      { code: 'uk', label: 'Ukrainian (uk)' },
      { code: 'hr', label: 'Croatian (hr)' },
      { code: 'sr', label: 'Serbian (sr)' },
      { code: 'bs', label: 'Bosnian (bs)' },
      { code: 'sq', label: 'Albanian (sq)' },
      { code: 'mk', label: 'Macedonian (mk)' },
      { code: 'sl', label: 'Slovenian (sl)' },
      { code: 'bg', label: 'Bulgarian (bg)' },
      { code: 'fa', label: 'Farsi (fa)' },
      { code: 'ur', label: 'Urdu (ur)' },
      { code: 'he', label: 'Hebrew (he)' },
      { code: 'ps', label: 'Pashto (ps)' },
      { code: 'ku', label: 'Kurdish (ku)' },
      { code: 'dv', label: 'Dhivehi (dv)' },
      { code: 'tl', label: 'Tagalog (tl)' },
    ];
    var supportedLanguages = languageOptions.map(function(option) {
      return option.code;
    });
    const rtlLanguages = ['ar', 'fa', 'ur', 'he', 'ps', 'ku', 'dv'];
    var storedLanguage = localStorage.getItem('selectedLanguage');
    window.currentLang = supportedLanguages.indexOf(storedLanguage) !== -1 ? storedLanguage : 'en';

    function languageFileExists(path) {
      var request = new XMLHttpRequest();

      try {
        request.open('HEAD', path, false);
        request.send();
        return request.status >= 200 && request.status < 400;
      } catch (error) {
        return false;
      }
    }

    function applyLanguageContext() {
      document.documentElement.lang = window.currentLang;
      document.documentElement.dir = rtlLanguages.indexOf(window.currentLang) !== -1 ? 'rtl' : 'ltr';
    }

    function getRouteDocument() {
      var route = window.location.hash ? window.location.hash.slice(1) : '/';
      var queryIndex = route.indexOf('?');
      var path = queryIndex === -1 ? route : route.slice(0, queryIndex);
      var segments = path.split('/').filter(Boolean);
      var docPath = 'README';

      if (segments.length === 0) {
        return docPath;
      }

      if (segments[0] === 'rules') {
        if (segments.length >= 3) {
          docPath = segments.slice(2).join('/');
        } else {
          docPath = 'README';
        }
      } else {
        docPath = segments.join('/');
      }

      if (!docPath || docPath === 'index' || docPath === 'index.html') {
        docPath = 'README';
      }

      return docPath.replace(/\.md$/i, '');
    }

    function routeForLanguageDocument(lang, docPath) {
      return '#/rules/' + lang + '/' + docPath.replace(/\.md$/i, '');
    }

    function ensureRouteForCurrentLanguage(replaceState) {
      var docPath = getRouteDocument();
      var targetHash = routeForLanguageDocument(window.currentLang, docPath);

      if (replaceState) {
        window.history.replaceState(null, '', window.location.pathname + window.location.search + targetHash);
      } else if (window.location.hash !== targetHash) {
        window.location.hash = targetHash;
      }
    }

    function languageHasCoreFiles(lang) {
      return languageFileExists('/rules/' + lang + '/README.md') &&
        languageFileExists('/rules/' + lang + '/_sidebar.md');
    }

    if (window.currentLang !== 'en' && !languageHasCoreFiles(window.currentLang)) {
      window.currentLang = 'en';
      localStorage.setItem('selectedLanguage', 'en');
    }

    applyLanguageContext();
    ensureRouteForCurrentLanguage(true);

    function setCurrentLanguage(lang) {
      if (supportedLanguages.indexOf(lang) === -1) {
        lang = 'en';
      }

      localStorage.setItem('selectedLanguage', lang);
      window.currentLang = lang;

      if (window.currentLang !== 'en' && !languageHasCoreFiles(window.currentLang)) {
        window.currentLang = 'en';
        localStorage.setItem('selectedLanguage', 'en');
      }

      // Explicitly update the hash route, then force a full page reload.
      // Docsify's `alias` config (used for the sidebar/navbar language
      // fallback below) is only evaluated once at page load, so a
      // hash-only change would leave it pointed at the *previous*
      // language. Reloading guarantees the whole frame (sidebar, navbar,
      // RTL direction, alias map) is rebuilt for the newly selected
      // language instead of just swapping the main content pane.
      window.location.hash = routeForLanguageDocument(window.currentLang, getRouteDocument());
      window.location.reload();
    }

    function renderLanguagePicker() {
      var sidebar = document.querySelector('.sidebar');
      var sidebarNav = document.querySelector('.sidebar-nav');

      if (!sidebar || !sidebarNav) {
        return;
      }

      var container = document.querySelector('.language-picker');

      if (!container) {
        container = document.createElement('div');
        container.className = 'language-picker';
        container.innerHTML = '<label for="language-picker-select">Language</label><select id="language-picker-select" aria-label="Select language"></select>';
        sidebar.insertBefore(container, sidebarNav);
      }

      var select = container.querySelector('select');

      if (!select.dataset.initialized) {
        languageOptions.forEach(function(option) {
          var optionElement = document.createElement('option');
          optionElement.value = option.code;
          optionElement.textContent = option.label;
          select.appendChild(optionElement);
        });

        select.addEventListener('change', function(event) {
          setCurrentLanguage(event.target.value);
        });

        select.dataset.initialized = 'true';
      }

      select.value = window.currentLang;
    }

    // Falls back to the English copy of *this one page* when the current
    // language doesn't have a translation for it yet. Deliberately does
    // NOT touch window.currentLang or the stored language preference --
    // a single untranslated page shouldn't knock the user's whole session
    // back to English; the next page they visit should still try their
    // selected language first.
    function enforceEnglishFallbackForMissingRoute() {
      if (window.currentLang === 'en') {
        return;
      }

      var docPath = getRouteDocument();
      var expectedHash = routeForLanguageDocument(window.currentLang, docPath);

      // Only act if we're actually looking at a route for the current
      // language. This avoids redirect loops once we've already fallen
      // back to /rules/en/... for this page.
      if (window.location.hash !== expectedHash) {
        return;
      }

      if (!languageFileExists('/rules/' + window.currentLang + '/' + docPath + '.md')) {
        window.location.hash = routeForLanguageDocument('en', docPath);
      }
    }

    function languagePickerPlugin(hook) {
      hook.mounted(function() {
        renderLanguagePicker();
      });

      // doneEach fires after every route render (including the first),
      // so both the initial load and every subsequent in-app navigation
      // (sidebar clicks, language switches, back/forward) get the RTL
      // context, sidebar/menu re-render, and 404 fallback check applied.
      hook.doneEach(function() {
        applyLanguageContext();
        renderLanguagePicker();
        enforceEnglishFallbackForMissingRoute();
      });
    }

    // Docsify loads _sidebar.md/_navbar.md relative to the current route's
    // folder by default. Not every language has its own translated copy
    // yet, so build an alias map that redirects ONLY the specific
    // sidebar/navbar paths that don't exist (yet) for the current
    // language back to the English original -- this is computed fresh on
    // every page load (see the forced reload in setCurrentLanguage above),
    // so it stays correct as translations land over time. A single
    // catch-all regex alias would redirect every language's sidebar to
    // English unconditionally, which would defeat localized sidebars
    // entirely, so we only alias what's actually missing.
    var docsifyAlias = {};
    if (window.currentLang !== 'en') {
      var localizedSidebarPath = '/rules/' + window.currentLang + '/_sidebar.md';
      var localizedNavbarPath = '/rules/' + window.currentLang + '/_navbar.md';

      if (!languageFileExists(localizedSidebarPath)) {
        docsifyAlias[localizedSidebarPath] = '/rules/en/_sidebar.md';
      }

      if (!languageFileExists(localizedNavbarPath)) {
        docsifyAlias[localizedNavbarPath] = '/rules/en/_navbar.md';
      }
    }

    // Docsify Configuration (see https://docsify.js.org/#/configuration)
    window.$docsify = {
      name: 'Menu',
      //logo: '/_media/icon.png',

      // Sidebar Configuration
      auto2top: true,
      loadSidebar: true,
      loadNavbar: true,
      alias: docsifyAlias,
      homepage: '/rules/' + window.currentLang + '/README.md',
      maxLevel: 3,
      // Set subMaxLevel to 0 to remove automatic display of page table of contents (TOC) in Sidebar
      subMaxLevel: 3,
      relativePath: true,
      // Search Plugin Configuration
      search: {
        placeholder: 'Type to search',
        noData: 'No matches found.',
        // Headline depth, 1 - 6
        depth: 4,
      },
      plugins: [languagePickerPlugin]
    };
  </script>
  
  <script 
    src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"
    type="text/javascript">
  </script>

  <!-- Required -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
  <script src="https://unpkg.com/docsify-plugin-flexible-alerts"></script>

  <!-- Fontawesome -->
  <script src="//unpkg.com/docsify-fontawesome/dist/docsify-fontawesome.min.js"></script>

  <!-- Material Icons -->
  

  <!-- Recommended -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>

  <!-- Recommended -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>

</body>
</html>
